name: SoulGuru CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: soulguru-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-quality:
    name: Web, API, and Reading Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Soul Guru local quality gate
        run: npm run soul:quality

      - name: Build web app
        run: npm run build

      - name: Check for committed secrets and artifacts
        run: npm run security:check

      - name: Smoke-test local API routes
        run: npm run local:smoke

      - name: Audit production dependencies
        run: npm audit --omit dev

      - name: Report production readiness
        run: npm run production:check -- --allow-fail

      - name: Soul Guru live OpenAI quality gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            npm run soul:quality:ai
          else
            echo "Skipping live OpenAI quality gate because OPENAI_API_KEY is not configured."
          fi

  android-debug:
    name: Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          npm run android:apk

      - name: Check APK for bundled secrets
        run: npm run security:check

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoulGuru-debug-apk
          path: SoulGuru-debug.apk
          if-no-files-found: error
